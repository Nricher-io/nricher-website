name: Market Analysis - refresh des données JSON

# Génère les fichiers JSON statiques pour les pages Analyse de marché.
# Même principe que weekly-kpis-refresh.yml : script Python côté serveur
# avec NRICHER_SITE_TOKEN, fichiers JSON commités dans data/market-analysis/
# et servis par GitHub Pages — zéro appel API côté browser.

on:
  schedule:
    # Lundis 07:00 UTC, juste après le refresh Weekly KPIs (06:00)
    - cron: '0 7 * * 1'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installer les dépendances
        working-directory: nricher-engine
        run: pip install -r requirements.txt

      - name: Générer les JSON d'analyse de marché
        working-directory: nricher-engine
        env:
          NRICHER_SITE_TOKEN: ${{ secrets.NRICHER_SITE_TOKEN }}
          # À basculer sur https://api.nricher.io quand les endpoints market-analysis seront déployés en prod
          NRICHER_API_BASE_URL: https://api-scw-staging.nricher.io
        run: python3 generate_market_analysis.py

      - name: Commit et push si changements
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/market-analysis/
          git diff --staged --quiet || git commit -m "chore: refresh analyse de marché [skip ci]"
          git push
